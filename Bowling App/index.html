<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5261/5261168.png">
    <title>Bowling Pro Analyse</title>
    
    <!-- Externe Bibliotheken -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-gray: rgba(28, 28, 30, 0.8);
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-sec: #8E8E93;
        }
        
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            color: white;
            /* Fixiertes Hintergrundbild */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                              url("https://images.unsplash.com/photo-1538356111083-d22eb4bc0bb0?q=80&w=2000&auto=format&fit=crop");
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .mobile-wrapper { 
            max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; 
            background: transparent;
        }
        
        .tab-bar { 
            position: sticky; top: 0; display: flex; 
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 14px 20px; border-bottom: 0.5px solid var(--glass-border); z-index: 100; 
        }
        
        .tab-btn { flex: 1; padding: 8px; border: none; background: none; font-weight: 700; color: var(--text-sec); font-size: 13px; letter-spacing: 0.5px; transition: color 0.3s; }
        .tab-btn.active { color: var(--ios-blue); }

        .glass-box { 
            background: var(--glass-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 22px; margin-bottom: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--ios-blue);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* PDF Layout Styles */
        .pdf-page {
            background: white;
            color: #1a3a5f;
            padding: 25mm 20mm;
            box-sizing: border-box;
            width: 210mm;
            min-height: 297mm;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // --- BERECHNUNGSLOGIK ---
        const calculateBowlingScore = (frames) => {
            let total = 0;
            let frameScores = [];
            const rolls = [];
            frames.forEach(f => {
                if (!f) return;
                if (f === "X") rolls.push(10);
                else if (f.includes("/")) {
                    const first = parseInt(f[0]) || 0;
                    rolls.push(first, 10 - first);
                } else if (f.startsWith("S")) {
                    rolls.push(parseInt(f[1]) || 0, (f[2] === "-" ? 0 : parseInt(f[2])) || 0);
                } else {
                    rolls.push(parseInt(f[0]) || 0, (f[1] === "-" ? 0 : parseInt(f[1])) || 0);
                }
            });
            let rollIdx = 0;
            for (let i = 0; i < 10; i++) {
                if (rolls[rollIdx] === 10) {
                    total += 10 + (rolls[rollIdx + 1] || 0) + (rolls[rollIdx + 2] || 0);
                    rollIdx += 1;
                } else if (rolls[rollIdx] + (rolls[rollIdx + 1] || 0) === 10) {
                    total += 10 + (rolls[rollIdx + 2] || 0);
                    rollIdx += 2;
                } else {
                    total += (rolls[rollIdx] || 0) + (rolls[rollIdx + 1] || 0);
                    rollIdx += 2;
                }
                frameScores.push(total);
            }
            return { total, frameScores };
        };

        function App() {
            const [playerName, setPlayerName] = useState("");
            const [tournamentName, setTournamentName] = useState("");
            const [games, setGames] = useState([]);
            const [activeTab, setActiveTab] = useState('scan');
            const [isScanning, setIsScanning] = useState(false);
            const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);
            
            const fileInputRef = useRef(null);
            const reportRef = useRef(null);
            const apiKey = "AIzaSyBTh1r7QZrKOCskkAfvCAc6qtMTEz31vd8"; // Dein Gemini API Key

            // --- KI SCAN ---
            const handleFileUpload = async (event) => {
                const file = event.target.files?.[0];
                if (!file) return;
                setIsScanning(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64Data = (reader.result).split(',')[1];
                    try {
                        const prompt = `Analysiere dieses Bowling-Scoreboard. Extrahiere Spielername und alle 10 Frames. Antworte NUR als JSON: { "name": "Name", "frames": ["X", "9/", "S71", ...] }`;
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data } }] }]
                            })
                        });
                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) {
                            const data = JSON.parse(text.replace(/```json|```/g, "").trim());
                            if (data.name && !playerName) setPlayerName(data.name);
                            setGames(prev => [...prev, { id: Date.now(), name: `Spiel ${prev.length + 1}`, frames: data.frames }]);
                            if (games.length >= 2) setActiveTab('report');
                        }
                    } catch (err) { console.error(err); } finally { setIsScanning(false); }
                };
                reader.readAsDataURL(file);
            };

            // --- STATISTIKEN ---
            const stats = useMemo(() => {
                if (games.length === 0) return null;
                const scores = games.map(g => calculateBowlingScore(g.frames).total);
                const totalPins = scores.reduce((a, b) => a + b, 0);
                let framesCount = 0, strikes = 0, closed = 0, splits = 0;
                games.forEach(g => g.frames.forEach(f => {
                    if (!f) return; framesCount++;
                    if (f.includes("X")) strikes++;
                    if (f.includes("X") || f.includes("/")) closed++;
                    if (f.startsWith("S")) splits++;
                }));
                return {
                    avg: (totalPins / games.length).toFixed(1),
                    pins: totalPins,
                    strikeRate: ((strikes / framesCount) * 100).toFixed(1),
                    closedRate: ((closed / framesCount) * 100).toFixed(1),
                    splitRate: ((splits / framesCount) * 100).toFixed(1),
                    max: Math.max(...scores)
                };
            }, [games]);

            const downloadPdf = () => {
                if (!reportRef.current) return;
                setIsGeneratingPdf(true);
                const element = reportRef.current;
                const opt = {
                    margin: 0, filename: `Bowling_Report_${playerName || 'Spieler'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save().then(() => setIsGeneratingPdf(false));
            };

            return (
                <div className="mobile-wrapper flex flex-col">
                    <nav className="tab-bar sticky top-0 flex justify-around pt-10 pb-4 z-50">
                        <button onClick={() => setActiveTab('scan')} className={`tab-btn ${activeTab === 'scan' ? 'active' : ''}`}>SCAN</button>
                        <button onClick={() => setActiveTab('edit')} className={`tab-btn ${activeTab === 'edit' ? 'active' : ''}`}>EDIT</button>
                        <button onClick={() => setActiveTab('report')} className={`tab-btn ${activeTab === 'report' ? 'active' : ''}`}>REPORT</button>
                    </nav>

                    <div className="content p-5 flex-1 overflow-y-auto">
                        {activeTab === 'scan' && (
                            <div className="space-y-6">
                                <div className="glass-box space-y-4">
                                    <h3 className="text-[10px] font-black uppercase text-blue-400 tracking-widest">Stammdaten</h3>
                                    <div className="space-y-3">
                                        <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="Spieler Name" />
                                        <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" value={tournamentName} onChange={e => setTournamentName(e.target.value)} placeholder="Turnier / Ort" />
                                    </div>
                                </div>

                                <div className="glass-box text-center space-y-4 py-10">
                                    <h3 className={`text-sm font-bold ${games.length < 3 ? 'text-red-400' : 'text-green-400'}`}>
                                        {games.length < 3 ? `Fortschritt: ${games.length}/3 Fotos` : 'Analyse bereit'}
                                    </h3>
                                    {isScanning ? (
                                        <div className="py-6"><div className="loader"></div></div>
                                    ) : (
                                        <div onClick={() => fileInputRef.current?.click()} className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto shadow-2xl active:scale-90 transition-transform">
                                            <span className="text-3xl">📸</span>
                                        </div>
                                    )}
                                    <p className="text-xs text-gray-400">Scoreboard für Spiel {games.length + 1} fotografieren</p>
                                    <input type="file" ref={fileInputRef} hidden accept="image/*" capture="environment" onChange={handleFileUpload} />
                                </div>
                                {games.length > 0 && <button onClick={() => setGames([])} className="w-full text-red-500 text-[10px] font-black uppercase tracking-tighter opacity-50">Daten zurücksetzen</button>}
                            </div>
                        )}

                        {activeTab === 'edit' && (
                            <div className="space-y-4">
                                {games.length === 0 ? <p className="text-center text-gray-500 py-20">Keine Daten.</p> : games.map((g, gIdx) => (
                                    <div key={g.id} className="glass-box p-0 overflow-hidden">
                                        <div className="px-4 py-2 text-[10px] font-bold text-blue-400 border-b border-white/5">{g.name}</div>
                                        <div className="grid grid-cols-11">
                                            {g.frames.map((f, fIdx) => (
                                                <div key={fIdx} className="border-r border-white/5 flex flex-col items-center h-12">
                                                    <span className="text-[7px] text-gray-600 pt-1">{fIdx+1}</span>
                                                    <input className="bg-transparent w-full text-center text-xs font-bold h-full outline-none" value={f} onChange={e => {
                                                        const n = [...games]; n[gIdx].frames[fIdx] = e.target.value.toUpperCase(); setGames(n);
                                                    }} />
                                                </div>
                                            ))}
                                            <div className="bg-blue-600 flex items-center justify-center font-black text-[10px]">{calculateBowlingScore(g.frames).total}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'report' && stats && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="glass-box p-5 text-center m-0">
                                        <span className="text-[10px] text-gray-400 uppercase font-black">Schnitt</span>
                                        <strong className="block text-3xl">{stats.avg}</strong>
                                    </div>
                                    <div className="glass-box p-5 text-center m-0">
                                        <span className="text-[10px] text-gray-400 uppercase font-black">Strikes</span>
                                        <strong className="block text-3xl text-green-400">{stats.strikeRate}%</strong>
                                    </div>
                                </div>

                                <div className="glass-box space-y-3">
                                    <h4 className="text-blue-400 text-[10px] font-black uppercase">Vorschau Analyse</h4>
                                    <p className="text-sm leading-relaxed">
                                        Basierend auf {games.length} Spielen zeigt {playerName || 'der Spieler'} ein hohes Potenzial. 
                                        Die Spare-Quote von {stats.closedRate}% ist der Schlüssel zur 190er-Marke.
                                    </p>
                                    <div className="flex gap-2 flex-wrap">
                                        <span className="bg-white/10 px-3 py-1 rounded-full text-[10px] font-bold">Spare-Drill 7/10</span>
                                        <span className="bg-white/10 px-3 py-1 rounded-full text-[10px] font-bold">Lane-Reading</span>
                                    </div>
                                </div>

                                <button 
                                    disabled={games.length < 3 || isGeneratingPdf} 
                                    onClick={downloadPdf}
                                    className={`w-full py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl transition-all ${games.length < 3 ? 'bg-gray-800 text-gray-600' : 'bg-blue-600 text-white active:scale-95'}`}
                                >
                                    {isGeneratingPdf ? 'PDF wird erstellt...' : games.length < 3 ? `Noch ${3-games.length} Scans nötig` : 'PDF Analyse Exportieren'}
                                </button>
                            </div>
                        )}
                    </div>

                    {/* HIDDEN PDF GENERATION TEMPLATE */}
                    <div style={{ position: 'absolute', left: '-9999px', top: 0 }}>
                        <div ref={reportRef}>
                            {/* SEITE 1 */}
                            <div className="pdf-page">
                                <div className="flex justify-between items-end border-b-4 border-[#1a3a5f] pb-4 mb-8">
                                    <div className="text-sm font-bold uppercase">{tournamentName || "Bowling Analyse"}</div>
                                    <div className="text-4xl font-black">{playerName || "Player Report"}</div>
                                    <div className="text-sm">{new Date().toLocaleDateString('de-DE')}</div>
                                </div>
                                <div className="grid grid-cols-4 gap-4 mb-10">
                                    <div className="bg-[#f4f7fa] p-4 text-center border border-[#d1d9e6] rounded-xl">
                                        <span className="text-[10px] font-bold uppercase text-[#5c6b80]">Schnitt Ø</span>
                                        <strong className="block text-2xl text-[#1a3a5f]">{stats?.avg}</strong>
                                    </div>
                                    <div className="bg-[#f4f7fa] p-4 text-center border border-[#d1d9e6] rounded-xl">
                                        <span className="text-[10px] font-bold uppercase text-[#5c6b80]">Strikes</span>
                                        <strong className="block text-2xl text-[#1a3a5f]">{stats?.strikeRate}%</strong>
                                    </div>
                                    <div className="bg-[#f4f7fa] p-4 text-center border border-[#d1d9e6] rounded-xl">
                                        <span className="text-[10px] font-bold uppercase text-[#5c6b80]">Closed</span>
                                        <strong className="block text-2xl text-[#1a3a5f]">{stats?.closedRate}%</strong>
                                    </div>
                                    <div className="bg-[#f4f7fa] p-4 text-center border border-[#d1d9e6] rounded-xl">
                                        <span className="text-[10px] font-bold uppercase text-[#5c6b80]">High Game</span>
                                        <strong className="block text-2xl text-[#1a3a5f]">{stats?.max}</strong>
                                    </div>
                                </div>
                                <h3 className="text-lg font-black text-[#1a3a5f] border-l-8 border-[#1a3a5f] pl-4 mb-6 uppercase">Turnier Verlauf</h3>
                                {games.map(g => (
                                    <div key={g.id} className="mb-4 border border-[#1a3a5f] rounded overflow-hidden">
                                        <div className="grid grid-cols-11 text-center">
                                            {[...Array(10)].map((_,i) => <div key={i} className="bg-gray-100 py-1 text-[8px] border-r border-gray-300 font-bold">{i+1}</div>)}
                                            <div className="bg-[#1a3a5f] text-white text-[8px] py-1 font-bold">TOTAL</div>
                                            {g.frames.map((f, i) => <div key={i} className="py-2 text-sm border-r border-gray-200 font-bold">{f || "-"}</div>)}
                                            <div className="bg-[#1a3a5f] text-white flex items-center justify-center font-black">{calculateBowlingScore(g.frames).total}</div>
                                        </div>
                                    </div>
                                ))}
                                <div className="mt-12 p-8 bg-gray-50 border border-gray-200 rounded-3xl">
                                    <h3 className="text-lg font-black mb-3">Management Summary</h3>
                                    <p className="text-sm leading-relaxed text-justify">
                                        {playerName} zeigt bei einer Strike-Quote von {stats?.strikeRate}% eine enorme Anwurfkraft. Die Differenz zwischen den hohen Anwürfen und dem finalen Schnitt von {stats?.avg} deutet auf ungenutzte Reserven im Räumspiel hin. Durch ein konsequentes Spare-System lässt sich der Turnierschnitt kurzfristig signifikant steigern.
                                    </p>
                                </div>
                            </div>
                            <div className="html2pdf__page-break"></div>
                            {/* SEITE 2 */}
                            <div className="pdf-page">
                                <div className="flex justify-between items-center border-b-2 border-gray-200 pb-4 mb-10">
                                    <div className="text-xl font-black uppercase text-gray-300 tracking-tighter">Leistungsdiagnostik & Coaching</div>
                                    <div className="text-sm font-bold">{playerName}</div>
                                </div>
                                <h3 className="text-lg font-black text-[#1a3a5f] border-l-8 border-[#1a3a5f] pl-4 mb-8 uppercase">🔍 Experten-Audit</h3>
                                <div className="space-y-8 mb-12">
                                    <div className="pl-4 border-l border-gray-200">
                                        <h4 className="font-bold text-[#1a3a5f] uppercase text-xs">Technische Beobachtung</h4>
                                        <p className="text-sm text-gray-600 mt-2 leading-relaxed text-justify">Deine Fähigkeit, Strike-Ketten zu bilden, beweist ein technisch hohes Deckenniveau. Die Ballabgabe ist stabil, was zu einem exzellenten Eintrittswinkel führt.</p>
                                    </div>
                                    <div className="pl-4 border-l border-gray-200">
                                        <h4 className="font-bold text-[#1a3a5f] uppercase text-xs">Bahn-Management</h4>
                                        <p className="text-sm text-gray-600 mt-2 leading-relaxed text-justify">Die Analyse der Serie über {games.length} Spiele zeigt, dass die Reaktion auf Bahnveränderungen (Transition) meist erst nach einem Open Frame erfolgt. Hier liegt ein strategischer Hebel von etwa 15 Pins pro Spiel.</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-8 mb-12">
                                    <div className="p-6 border border-green-200 bg-green-50 rounded-3xl">
                                        <h4 className="text-green-800 font-bold mb-3 uppercase text-[10px]">Stärken</h4>
                                        <ul className="text-xs space-y-2 text-green-700">
                                            <li>• Präzision beim Anwurf</li>
                                            <li>• Hohe Ballgeschwindigkeit</li>
                                            <li>• Ausdauer über lange Serien</li>
                                        </ul>
                                    </div>
                                    <div className="p-6 border border-red-200 bg-red-50 rounded-3xl">
                                        <h4 className="text-red-800 font-bold mb-3 uppercase text-[10px]">Potenziale</h4>
                                        <ul className="text-xs space-y-2 text-red-700">
                                            <li>• Spare-Routine Eckpins</li>
                                            <li>• Proaktives Adjustment</li>
                                            <li>• Mentaler Reset-Prozess</li>
                                        </ul>
                                    </div>
                                </div>
                                <h3 className="text-lg font-black text-[#1a3a5f] border-l-8 border-[#1a3a5f] pl-4 mb-8 uppercase">📋 Trainings-Schwerpunkte</h3>
                                <div className="bg-[#f0f7ff] p-8 border border-[#d0e3ff] rounded-3xl">
                                    <div className="grid grid-cols-2 gap-10">
                                        <div>
                                            <strong className="text-[#1a3a5f] text-sm block mb-2 uppercase">A: Spare-Automatisierung</strong>
                                            <p className="text-xs leading-relaxed text-gray-600 italic">Drill: 30 Min nur auf Pin 7 und 10 zielen. Ziel: 10 Treffer in Folge pro Seite mit dem Kunststoffwurf.</p>
                                        </div>
                                        <div>
                                            <strong className="text-[#1a3a5f] text-sm block mb-2 uppercase">B: Lane Reading</strong>
                                            <p className="text-xs leading-relaxed text-gray-600 italic">Drill: Proaktives Wandern. Nach 2 "hohen" Treffern sofort 2 Bretter nach links versetzen.</p>
                                        </div>
                                    </div>
                                    <div className="mt-10 pt-6 border-t border-blue-200 text-center">
                                        <em className="text-sm font-bold text-blue-900">Schnitt-Ziel für die nächste Serie: {'\u003e'}185 Pins.</em>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
